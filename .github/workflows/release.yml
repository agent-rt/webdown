name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wasm:
    name: Build turndown.wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: jcbhmr/setup-javy@v1

      - name: Build turndown.wasm
        working-directory: engine/turndown-wasm
        run: |
          bun install --frozen-lockfile
          mkdir -p dist
          bun build src/index.ts --outfile=dist/bundle.js --target=node --minify
          javy build dist/bundle.js -o dist/turndown.wasm

      - uses: actions/upload-artifact@v4
        with:
          name: turndown-wasm
          path: engine/turndown-wasm/dist/turndown.wasm
          retention-days: 1

  build-binary:
    name: Build ${{ matrix.target }}
    needs: build-wasm
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            npm-pkg: webdown-darwin-arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            npm-pkg: webdown-darwin-x64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            npm-pkg: webdown-linux-x64-gnu
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            npm-pkg: webdown-linux-arm64-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: actions/download-artifact@v4
        with:
          name: turndown-wasm
          path: engine/turndown-wasm/dist

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p webdown-cli

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: webdown-${{ matrix.npm-pkg }}
          path: target/${{ matrix.target }}/release/webdown
          retention-days: 1

  publish-npm:
    name: Publish to npm
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare platform packages
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          for pkg in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu; do
            dir="npm/webdown-${pkg}"
            artifact="artifacts/webdown-webdown-${pkg}/webdown"

            # Copy binary into package directory
            cp "$artifact" "$dir/webdown"
            chmod +x "$dir/webdown"

            # Update version in package.json
            jq --arg v "$VERSION" '.version = $v' "$dir/package.json" > "$dir/package.json.tmp"
            mv "$dir/package.json.tmp" "$dir/package.json"

            echo "==> $dir ($(du -h "$dir/webdown" | cut -f1))"
          done

      - name: Update main package version
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cd npm/webdown

          # Update version and optionalDependencies versions
          jq --arg v "$VERSION" '
            .version = $v |
            .optionalDependencies |= with_entries(.value = $v)
          ' package.json > package.json.tmp
          mv package.json.tmp package.json

          cat package.json

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu; do
            echo "==> Publishing @agent-rt/webdown-${pkg}"
            cd "npm/webdown-${pkg}"
            npm publish --access public
            cd ../..
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/webdown
          npm publish --access public

  github-release:
    name: GitHub Release
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release assets
        run: |
          mkdir -p release
          for pkg in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu; do
            src="artifacts/webdown-webdown-${pkg}/webdown"
            chmod +x "$src"
            tar -czf "release/webdown-${pkg}.tar.gz" -C "$(dirname "$src")" webdown
          done
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*.tar.gz
